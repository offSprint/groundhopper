services:
  - type: web
    name: groundhopper
    runtime: image
    repo: https://github.com/YOUR_USERNAME/groundhopper
    plan: free
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_NAME
        value: groundhopper
      - key: DB_USER
        value: groundhopper
      - key: DB_PASS
        value: your_password